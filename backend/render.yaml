services:
  - type: web
    name: meddesk-backend
    env: node
    plan: free # Requesting the free tier explicitly
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
    autoDeploy: false # Trigger deployments manually by default
