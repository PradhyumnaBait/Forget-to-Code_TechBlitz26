services:
  - type: web
    name: meddesk-backend
    env: node
    plan: free # Requesting the free tier explicitly
    rootDir: backend # Tell Render to run commands inside the 'backend' folder
    buildCommand: npm install --include=dev && npx prisma generate && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
    autoDeploy: false # Trigger deployments manually by default
